<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="admin-container">
    <h1>Admin Panel</h1>
    <h2>Manage Users</h2>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user[0] }}</td>
            <td>{{ user[1] }}</td>
            <td>{{ user[2] }}</td>
            <td>{{ user[3] }}</td>
            <td>
                <form method="POST" action="{{ url_for('admin_panel') }}">
                    <input type="hidden" name="user_id" value="{{ user[0] }}">
                    <input type="text" name="username" value="{{ user[1] }}" placeholder="Username">
                    <input type="email" name="email" value="{{ user[2] }}" placeholder="Email">
                    <button type="submit" name="action" value="update">Update</button>
                    <button type="submit" name="action" value="delete">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
    <h2>Add New User</h2>
    <form method="POST" action="{{ url_for('admin_panel') }}">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" name="action" value="add">Add User</button>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <title>Saved Cities</title>
</head>
<style>
    body {
        background: #121212;
        color: white;
        font-family: Arial;
    }
    
    .cities-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }
    
    .city-card {
        background: #222;
        padding: 20px;
        border-radius: 12px;
    }
    
    .city-card h3 {
        margin-bottom: 15px;
    }
    
    button {
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
</style>

<body>

    <h1>🌍 My Climate Watchlist</h1>

    <div class="cities-container">

        {% for city in cities %}

        <div class="city-card">

            <h3>📍 {{ city[1] }}</h3>

            <a href="/delete_city/{{ city[0] }}">
                <button>Delete</button>
            </a>

        </div>

        {% endfor %}

    </div>

    <hr>

    <form method="POST" action="/save_city">

        <input type="text" name="city" placeholder="Add City" required>

        <button type="submit">
        Save City
    </button>

    </form>
</body>

</html>
